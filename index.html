<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Task Management System</h1>
        <input type="text" id="taskId" placeholder="Task ID">
        <input type="text" id="taskName" placeholder="Task Name">
        <input type="text" id="taskDesc" placeholder="Task Description">
        <input type="text" id="assignedTo" placeholder="Assigned To">
        <button onclick="addTask()">Assign New Task</button>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Task Name</th>
                    <th>Description</th>
                    <th>Assigned To</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="taskList"></tbody>
        </table>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
